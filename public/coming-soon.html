<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Atlas Ally — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'DM Sans',-apple-system,sans-serif}
  body{
    background:linear-gradient(135deg,#0A3D52 0%,#0E7490 50%,#0A5F75 100%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:24px;
    overflow:hidden;
  }
  .stars{position:fixed;inset:0;pointer-events:none;}
  .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s infinite alternate;}
  @keyframes twinkle{0%{opacity:0.1}100%{opacity:0.7}}
  .card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:24px;
    padding:52px 40px;
    max-width:480px;
    width:100%;
    text-align:center;
    color:#fff;
  }
  .globe{font-size:64px;margin-bottom:20px;animation:float 4s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  h1{font-size:32px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px;}
  .tagline{font-size:16px;opacity:0.75;font-weight:400;line-height:1.5;margin-bottom:32px;}
  .divider{height:1px;background:rgba(255,255,255,0.15);margin:28px 0;}
  .label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:0.6;margin-bottom:16px;}
  .features{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:32px;}
  .feat{background:rgba(255,255,255,0.08);border-radius:12px;padding:14px 12px;border:1px solid rgba(255,255,255,0.1);}
  .feat-icon{font-size:22px;margin-bottom:6px;}
  .feat-text{font-size:11px;font-weight:500;opacity:0.85;line-height:1.3;}
  .notify{display:flex;gap:8px;margin-bottom:12px;}
  .notify input{
    flex:1;padding:12px 16px;border-radius:10px;
    border:1.5px solid rgba(255,255,255,0.25);
    background:rgba(255,255,255,0.1);
    color:#fff;font-size:14px;font-family:inherit;outline:none;
  }
  .notify input::placeholder{color:rgba(255,255,255,0.45)}
  .notify button{
    padding:12px 20px;border-radius:10px;border:none;
    background:#F59E0B;color:#1A2332;font-weight:700;font-size:14px;
    cursor:pointer;white-space:nowrap;font-family:inherit;
  }
  .notify button:hover{background:#FBBF24;}
  .success{display:none;background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.4);border-radius:10px;padding:12px;font-size:13px;color:#6EE7B7;}
  .footer{font-size:11px;opacity:0.45;margin-top:8px;}
  .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:100px;padding:6px 14px;font-size:11px;font-weight:600;letter-spacing:0.5px;margin-bottom:28px;}
  .badge-dot{width:6px;height:6px;border-radius:50%;background:#F59E0B;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="card">
  <div class="globe">🌍</div>
  <div class="badge"><span class="badge-dot"></span>IN DEVELOPMENT</div>
  <h1>Atlas Ally</h1>
  <p class="tagline">Global travel safety intelligence.<br>Know before you go.</p>

  <div class="features">
    <div class="feat"><div class="feat-icon">⚡</div><div class="feat-text">Real-time security alerts</div></div>
    <div class="feat"><div class="feat-icon">🗺️</div><div class="feat-text">Risk-aware route planning</div></div>
    <div class="feat"><div class="feat-icon">📊</div><div class="feat-text">Crime trend analytics</div></div>
    <div class="feat"><div class="feat-icon">🌐</div><div class="feat-text">190+ countries covered</div></div>
  </div>

  <div class="divider"></div>
  <div class="label">Get notified at launch</div>
  <div class="notify">
    <input type="email" id="email-input" placeholder="your@email.com">
    <button onclick="handleNotify()">Notify Me</button>
  </div>
  <div class="success" id="success-msg">✅ You're on the list! We'll be in touch.</div>
  <div class="footer">© 2026 Atlas Ally LLC · atlas-ally.com</div>
</div>

<script>
// Generate stars
var s = document.getElementById('stars');
for(var i=0;i<60;i++){
  var el=document.createElement('div');
  el.className='star';
  var size=Math.random()*2.5+0.5;
  el.style.cssText='width:'+size+'px;height:'+size+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;animation-delay:'+Math.random()*3+'s;animation-duration:'+(2+Math.random()*3)+'s;';
  s.appendChild(el);
}

function handleNotify(){
  var email=document.getElementById('email-input').value;
  if(!email||!email.includes('@')){alert('Please enter a valid email address.');return;}
  fetch('/api/notify-interest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email})}).catch(()=>{});
  document.querySelector('.notify').style.display='none';
  document.getElementById('success-msg').style.display='block';
}
</script>
</body>
</html>
